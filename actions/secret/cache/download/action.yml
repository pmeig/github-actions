name: download secret
description: retrieve secrets and expose in environment

outputs:
  secrets:
    value: ${{ steps.outputs.outputs.value }}
    description: secrets json object

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      id: cache
      with:
        name: secrets-${{ github.run_id }}
    - name: expose in env
      shell: bash
      run: |
        for property in $(jq -r '. | to_entries[] | .key + "=" + .value' "${{ steps.cache.outputs.download-path }}")
        do
          echo "$property" >> $GITHUB_ENV
        done
    - name: outputs
      shell: bash
      id: outputs
      run: |
        echo value=$(cat '${{ steps.cache.outputs.download-path }}') >> $GITHUB_OUTPUT
