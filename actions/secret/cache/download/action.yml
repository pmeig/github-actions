name: download secret
description: retrieve secrets and expose in environment

outputs:
  secrets:
    value: ${{ steps.outputs.outputs.value }}
    description: secrets json object

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      id: cache
      with:
        name: secrets-${{ github.run_id }}
    - name: expose in env
      shell: bash
      id: file
      run: |
        file='${{ steps.cache.outputs.download-path }}/secrets-${{ github.run_id }}.json'
        for property in $(jq -r '. | to_entries[] | .key + "=" + .value' "$file")
        do
          echo "::add-mask::$(echo $property | cut -d'=' -f2)"
          echo "$property" >> $GITHUB_ENV
        done
        echo "path=$file" >> $GITHUB_OUTPUT
    - name: outputs
      shell: bash
      id: outputs
      run: |
        json=$(cat '${{ steps.file.outputs.path }}')
        echo "::add-mask::$json"
        echo "value=$json" >> $GITHUB_OUTPUT
        rm -rf '${{ steps.file.outputs.path }}'
