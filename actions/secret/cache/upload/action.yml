name: upload secret
description: expose secret on file by artifact

inputs:
  json:
    description: json contains all secrets
    required: true

outputs:
  key:
    description: key to retrieve secrets
    value:


runs:
  using: composite
  steps:
    - name: create file to save json
      id: file
      shell: bash
      run: |
        filename='secrets-${{ github.run_id }}.json'
        echo '${{ inputs.json }}' > "$filename"
        echo "$filename" >> $GITHUB_OUTPUT
    - uses: actions/upload-artifact@v4
      with:
        name: secrets-${{ github.run_id }}
        path: ${{ steps.file.outputs.filename }}
        retention-days: 1
