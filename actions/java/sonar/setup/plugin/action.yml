name: setup plugin sonar
description: insert plugin sonar

inputs:
  host:
    default: 'http://sonar:9000'
    required: false
    description: host of sonar, or use SONAR_HOST
  token:
    default: ''
    required: false
    description: could be inject token by env SONAR_TOKEN
  workspace:
    default: '.'
    description: localization to apply plugin

runs:
  using: composite
  steps:
    - name: handle config
      shell: bash
      run: |
        if [ -z "$SONAR_HOST" ]
        then
          echo 'SONAR_HOST=${{ inputs.host }}' >> $GITHUB_ENV
        fi
        if [ -z "$SONAR_TOKEN" ]
        then
          echo 'SONAR_TOKEN=${{ inputs.token }}' >> $GITHUB_ENV
        fi
    - name: plugin sonar
      id: context
      shell: bash
      working-directory: ${{ inputs.workspace }}
      run: |
        if [ -z "$(mvn help:evaluate -Dexpression=project.build.plugins -q -DforceStdout=true -Psonar | grep sonar-maven-plugin)" ]
        then
          head='<groupId>org.sonarsource.scanner.maven</groupId><artifactId>sonar-maven-plugin</artifactId><version>${sonar.plugin.version}</version>'
          sonar="<plugin>$head</plugin>"
          echo "sonar=$sonar" >> $GITHUB_OUTPUT
        fi
    - name: export properties from sonar-project.properties
      id: properties
      shell: bash
      working-directory: ${{ inputs.workspace }}
      run: |
        if [ -f sonar-project.properties ]
        then
          properties=''
          for property in $(cat sonar-project.properties)
          do
            if [[ "$property" != *".binaries="* ]] && [[ "$property" != "sonar.sources="* ]] && [[ "$property" != "sonar.tests="* ]]
            then
              properties="$property $properties"
            fi
          done
          rm sonar-project.properties
          echo "value=$properties" >> $GITHUB_OUTPUT
        fi
    - name: insert sonar build properties step 1
      uses: pmeig/github-actions/actions/java/maven/insert/properties@main
      with:
        properties: 'sonar.sources=${project.build.sourceDirectory} sonar.tests=${project.build.testSourceDirectory}'
    - name: insert sonar build properties step 2
      uses: pmeig/github-actions/actions/java/maven/insert/properties@main
      with:
        properties: 'sonar.binaries=${project.build.sourceDirectory} sonar.java.binaries=${project.build.sourceDirectory}'
    - name: get latest version sonar
      uses: pmeig/github-actions/actions/java/maven/version/latest@main
      id: version
      with:
        groupId: org.sonarsource.scanner.maven
        artifactId: sonar-maven-plugin
    - name: insert sonar plugin version
      uses: pmeig/github-actions/actions/java/maven/insert/properties@main
      if: ${{ steps.context.outputs.sonar != '' }}
      with:
        workspace: ${{ inputs.workspace }}
        properties: sonar.plugin.version=${{ steps.version.outputs.latest }} ${{ steps.properties.outputs.value }} sonar.dynamicAnalysis=reuseReports sonar.host.url=${env.SONAR_HOST} sonar.token=${env.SONAR_TOKEN}
    - name: insert plugin sonar
      uses: pmeig/github-actions/actions/java/maven/insert/plugin@main
      if: ${{ steps.context.outputs.sonar != '' }}
      with:
        workspace: ${{ inputs.workspace }}
        plugins: ${{ steps.context.outputs.sonar }}
