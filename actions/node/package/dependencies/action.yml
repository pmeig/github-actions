name: dependencies pre build
description: retrieves all dependencies could build before

inputs:
  dev:
    required: false
    description: 'include dev dependencies true/false'
    default: 'false'
  workspace:
    description: 'workspace to execute pre build'
    default: '.'
    required: false
  prefix:
    required: false
    description: prefix of dependencies will build
    default: ''
  subpath-resolver:
    description: 'when found new dependency, execute bash script to retrieve path of package.json [$depend is name of dependency on dependencies section], please create package variable with path'
    required: true


outputs:
  peer:
    value: ${{ steps.peer-dependencies.outputs.value }}
    description: 'peer dependencies names'
  dev:
    value: ${{ steps.dev-dependencies.outputs.value }}
    description: 'dev dependencies names'
  dependencies:
    value: ${{ steps.dependencies.outputs.value }}
    description: 'dependencies names'
  paths:
    value: ${{ steps.priority.outputs.value }}
    description: 'paths of dependencies to build by priority (no error build)'


runs:
  using: composite
  steps:
    - name: listed dependencies
      id: dependencies
      working-directory: ${{ inputs.workspace }}
      shell: bash
      run: |
        dependencies=$(jq -rc '.dependencies' package.json)
        if [ "$dependencies" == 'null' ]
        then
          dependencies='{}'
        fi
        echo "value=$(echo $dependencies | jq -r 'keys | map(select(. | startswith("${{ inputs.prefix }}"))) | join(" ")')" >> $GITHUB_OUTPUT
    - name: listed dev dependencies
      if: ${{ inputs.dev == 'true' }}
      id: dev-dependencies
      working-directory: ${{ inputs.workspace }}
      shell: bash
      run: |
        dependencies=$(jq -rc '.devDependencies' package.json)
        if [ "$dependencies" == 'null' ]
        then
          dependencies='{}'
        fi
        echo "value=$(echo $dependencies | jq -r 'keys | map(select(. | startswith("${{ inputs.prefix }}"))) | join(" ")')" >> $GITHUB_OUTPUT
    - name: listed peer dependencies
      if: ${{ inputs.dev == 'true' }}
      id: peer-dependencies
      working-directory: ${{ inputs.workspace }}
      shell: bash
      run: |
        dependencies=$(jq -rc '.peerDependencies' package.json)
        if [ "$dependencies" == 'null' ]
        then
          dependencies='{}'
        fi
        echo "value=$(echo $dependencies | jq -r 'keys | map(select(. | startswith("${{ inputs.prefix }}"))) | join(" ")')" >> $GITHUB_OUTPUT
    - name: retrieve all sub dependencies
      id: sub-dependencies
      if: ${{ steps.dependencies.outputs.value != '' || steps.dev-dependencies.outputs.value != '' || steps.peer-dependencies.outputs.value != '' }}
      shell: bash
      run: |
        json='[]'
        depends='${{ steps.dependencies.outputs.value }} ${{ steps.dev-dependencies.outputs.value }} ${{ steps.peer-dependencies.outputs.value }}'
        depend=$(echo "$depends" | cut -d' ' -f1)
        depends=$(echo "$depends" | cut -d' ' -f2-)
        while [ -z "$depend" ]
        do
          depend=$(echo "$depends" | cut -d' ' -f1)
          depends=$(echo "$depends" | cut -d' ' -f2-)
        done
        depends="$depend $depends"
        while
        already=' '
        while [ -n "$depends" ]
        do
         depend=$(echo "$depends" | cut -d' ' -f1)
         depends=$(echo "$depends" | cut -d' ' -f2-)
         if [[ " $already " != *" $depend "* ]]
         then
           already="$already$depend "
           ${{ inputs.subpath-resolver }}
           dependencies=$(jq -rc '.dependencies')
           if [ "$dependencies" == 'null' ]
           then
            dependencies='{}'
           fi
           devDependencies=$(jq -rc '.devDependencies' $package/package.json)
           if [ "$devDependencies" == 'null' ]
           then
            devDependencies='{}'
           fi
           peerDependencies=$(jq -rc '.peerDependencies' $package/package.json)
           if [ "$peerDependencies" == 'null' ]
           then
            peerDependencies='{}'
           fi
           dependencies=$(echo $dependencies | jq -rc 'keys | map(select(. | startswith("${{ inputs.prefix }}")))')
           devDependencies=$(echo $devDependencies | jq -rc 'keys | map(select(. | startswith("${{ inputs.prefix }}")))')
           peerDependencies=$(echo $peerDependencies | jq -rc 'keys | map(select(. | startswith("${{ inputs.prefix }}")))')
           dependencies=$(echo $dependencies | jq -rc --argjson concat "$devDependencies" --argjson peer "$peerDependencies" '. + $concat + $peer')
           module="{\"name\":\"$depend\",\"dependencies\": $dependencies, \"path\": \"$package\"}"
           json=$(echo "$json" | jq -c --argjson item "$module" '. + [$item]')
           if [ "$dependencies" != '[]' ]
           then
             depends="$depends $(echo $dependencies | jq -c '.[]')"
           fi
         fi
        done
        echo "value=$(echo $json | jq -rc 'sort_by(.dependencies | length)')" >> $GITHUB_OUTPUT
    - name: order by priority
      id: priority
      shell: bash
      run: |
        built=' '
        value=''
        modules=$(echo '${{ steps.sub-dependencies.outputs.value }}$' | jq -rc 'join(" ")')
        while [ -n "$modules" ]
        do
          module=$(echo "$modules" | cut -d' ' -f1)
          modules=$(echo "$modules" | cut -d' ' -f2-)
          name=$(echo $module | jq -r '.name')
          dependencies=$(echo $module | jq -r '.dependencies')
          valid='true'
          if [ "$dependencies" != 'null' ]
          then
            dependencies=$(echo $dependencies | jq -rc 'join(" ")')
            while [ -n "$dependencies" ]
            do
              dependency=$(echo "$dependencies" | cut -d' ' -f1)
              dependencies=$(echo "$dependencies" | cut -d' ' -f2-)
              if [[ " $built " != *" $dependency "* ]]
              then
                valid='false'
              fi
            done
          fi
          if [ "$valid" == 'true' ]
          then
            built="$built$name "
            value="$value $(echo $module | jq -r '.path')"
          else
            modules="$modules $module"
          fi
        done
        echo "value=${value:1}" >> $GITHUB_OUTPUT
